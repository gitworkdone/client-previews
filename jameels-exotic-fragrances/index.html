<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jameel's Exotic Fragrances — The Scent Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   ROOT TOKENS — Direction A: Warm Ivory
   ============================================================ */
:root {
  --bg:         #f5f0e8;
  --surface:    #ede8df;
  --dark:       #2a2420;
  --text:       #2a2420;
  --gold:       #b8975a;
  --gold-dim:   #c4a882;
  --muted:      #8a7d72;
  --warm-glow:  rgba(184,151,90,0.15);

  /* Derived / utility */
  --surface-alt: rgba(237,232,223,0.85);
  --gold-alpha:  rgba(184,151,90,0.25);
  --dark-alpha:  rgba(42,36,32,0.08);
  --text-alpha:  rgba(42,36,32,0.6);
  --transition:  cubic-bezier(0.4,0,0.2,1);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Satoshi', system-ui, sans-serif;
  overflow-x: hidden;
  transition: background-color 0.6s var(--transition);
}

img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ============================================================
   TYPOGRAPHY SCALE
   ============================================================ */
.font-display    { font-family: 'Cormorant Garamond', Georgia, serif; }
.font-mono       { font-family: 'DM Mono', 'Courier New', monospace; }
.font-body       { font-family: 'Satoshi', system-ui, sans-serif; }

/* ============================================================
   SCROLL REVEAL UTILITY
   ============================================================ */
.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s var(--transition), transform 0.8s var(--transition);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal-left {
  opacity: 0;
  transform: translateX(-40px);
  transition: opacity 0.9s var(--transition), transform 0.9s var(--transition);
}
.reveal-left.visible {
  opacity: 1;
  transform: translateX(0);
}
.reveal-right {
  opacity: 0;
  transform: translateX(40px);
  transition: opacity 0.9s var(--transition), transform 0.9s var(--transition);
}
.reveal-right.visible {
  opacity: 1;
  transform: translateX(0);
}

@media (prefers-reduced-motion: reduce) {
  .reveal, .reveal-left, .reveal-right {
    opacity: 1;
    transform: none;
    transition: none;
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 48px;
  opacity: 0;
  transform: translateY(-12px);
  animation: navFadeIn 0.6s var(--transition) 0.2s forwards;
  mix-blend-mode: normal;
}

.nav::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, var(--bg), transparent);
  opacity: 0.85;
  pointer-events: none;
  z-index: -1;
}

@keyframes navFadeIn {
  to { opacity: 1; transform: translateY(0); }
}

.nav-logo {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--dark);
  text-transform: uppercase;
}

.nav-logo span {
  color: var(--gold);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  transition: color 0.3s;
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0; right: 0;
  height: 1px;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s var(--transition);
}

.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-cta {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--dark);
  padding: 10px 24px;
  border: 1px solid var(--dark);
  transition: background 0.3s, color 0.3s;
}

.nav-cta:hover {
  background: var(--gold);
  border-color: var(--gold);
}

.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
}

.nav-hamburger span {
  display: block;
  width: 24px;
  height: 1px;
  background: var(--dark);
}

/* ============================================================
   SECTION 1: HERO
   ============================================================ */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 700px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background-color: var(--dark);
}

#hero-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 60%, rgba(42,36,32,0.4) 0%, rgba(42,36,32,0.85) 100%);
  z-index: 1;
}

.hero-ghost {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 12vw;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: var(--bg);
  opacity: 0.045;
  white-space: nowrap;
  pointer-events: none;
  z-index: 2;
  user-select: none;
}

.hero-content {
  position: relative;
  z-index: 3;
  text-align: center;
  padding: 0 24px;
  will-change: transform;
}

.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
  opacity: 0;
  animation: wordReveal 0.7s var(--transition) 0.4s forwards;
}

.hero-headline {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(52px, 8vw, 96px);
  font-weight: 300;
  line-height: 1.05;
  color: var(--bg);
  letter-spacing: 0.02em;
  margin-bottom: 28px;
}

.hero-headline .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(40px);
  animation: wordReveal 0.7s var(--transition) forwards;
}

.hero-headline .line {
  display: block;
}

.hero-subhead {
  font-family: 'Satoshi', system-ui, sans-serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--gold-dim);
  letter-spacing: 0.06em;
  max-width: 460px;
  margin: 0 auto 44px;
  opacity: 0;
  animation: wordReveal 0.7s var(--transition) 1.2s forwards;
  line-height: 1.7;
}

.hero-ctas {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  opacity: 0;
  animation: wordReveal 0.7s var(--transition) 1.4s forwards;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dark);
  background: var(--gold);
  padding: 16px 36px;
  border: 1px solid var(--gold);
  transition: background 0.35s, color 0.35s, border-color 0.35s, transform 0.3s;
}

.btn-primary:hover {
  background: var(--bg);
  color: var(--dark);
  border-color: var(--bg);
  transform: translateY(-2px);
}

.btn-outline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--bg);
  background: transparent;
  padding: 16px 36px;
  border: 1px solid rgba(245,240,232,0.35);
  transition: border-color 0.35s, color 0.35s, transform 0.3s;
}

.btn-outline:hover {
  border-color: var(--gold);
  color: var(--gold);
  transform: translateY(-2px);
}

.hero-scroll-indicator {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: wordReveal 0.7s var(--transition) 1.8s forwards;
}

.hero-scroll-indicator span {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
}

.scroll-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}

@keyframes scrollPulse {
  0%, 100% { opacity: 0.4; transform: scaleY(1); }
  50% { opacity: 1; transform: scaleY(1.1); }
}

@keyframes wordReveal {
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .hero-headline .word,
  .hero-eyebrow,
  .hero-subhead,
  .hero-ctas,
  .hero-scroll-indicator {
    opacity: 1;
    transform: none;
    animation: none;
  }
  .nav { opacity: 1; transform: none; animation: none; }
}

/* ============================================================
   SECTION 2: BRAND TICKER
   ============================================================ */
.ticker-section {
  background-color: var(--dark);
  padding: 18px 0;
  overflow: hidden;
  border-top: 1px solid rgba(184,151,90,0.2);
  border-bottom: 1px solid rgba(184,151,90,0.2);
}

.ticker-row {
  display: flex;
  overflow: hidden;
  margin: 6px 0;
}

.ticker-row:hover .ticker-track { animation-play-state: paused; }

.ticker-track {
  display: flex;
  gap: 0;
  white-space: nowrap;
  flex-shrink: 0;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

.ticker-row--fwd .ticker-track { animation-name: tickerFwd; animation-duration: 28s; }
.ticker-row--rev .ticker-track { animation-name: tickerRev; animation-duration: 34s; }

@keyframes tickerFwd {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

@keyframes tickerRev {
  from { transform: translateX(-50%); }
  to   { transform: translateX(0); }
}

.ticker-item {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  padding: 0 28px;
}

.ticker-item .sep {
  color: var(--gold-dim);
  opacity: 0.5;
  margin-left: 28px;
}

@media (prefers-reduced-motion: reduce) {
  .ticker-track { animation: none; }
}

/* ============================================================
   SECTION 3: SCENT NAVIGATOR
   ============================================================ */
.navigator-wrapper {
  position: sticky;
  top: 0;
  z-index: 50;
  background-color: var(--bg);
  border-bottom: 1px solid var(--dark-alpha);
  padding: 0 48px;
  transition: background-color 0.4s;
}

.navigator-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.navigator-inner::-webkit-scrollbar { display: none; }

.nav-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
  margin-right: 8px;
  flex-shrink: 0;
}

.scent-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  background: var(--surface);
  border: 1px solid transparent;
  padding: 9px 20px;
  border-radius: 40px;
  white-space: nowrap;
  flex-shrink: 0;
  opacity: 0.65;
  transition: all 0.3s var(--transition);
  cursor: pointer;
}

.scent-pill:hover {
  opacity: 0.9;
  border-color: var(--gold-dim);
  background: var(--warm-glow);
}

.scent-pill.active {
  opacity: 1;
  border-color: var(--gold);
  background: var(--warm-glow);
  box-shadow: 0 0 0 3px var(--warm-glow);
  animation: pillPulse 2.5s ease-in-out infinite;
}

@keyframes pillPulse {
  0%, 100% { box-shadow: 0 0 0 3px var(--warm-glow); }
  50% { box-shadow: 0 0 0 8px transparent; }
}

/* ============================================================
   SECTION 4: SVG DIVIDER
   ============================================================ */
.svg-divider-section {
  padding: 80px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background-color: var(--bg);
  gap: 36px;
}

.svg-divider-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

#jef-svg {
  width: min(320px, 80vw);
  height: auto;
  overflow: visible;
}

.divider-path {
  fill: none;
  stroke: url(#goldGrad);
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 2000;
  stroke-dashoffset: 2000;
  transition: stroke-dashoffset 2.4s cubic-bezier(0.77,0,0.175,1);
}

.divider-path.drawn {
  stroke-dashoffset: 0;
}

.svg-divider-copy {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(18px, 3vw, 26px);
  font-style: italic;
  font-weight: 300;
  color: var(--dark);
  text-align: center;
  max-width: 560px;
  line-height: 1.5;
  letter-spacing: 0.03em;
}

.svg-divider-rule {
  display: flex;
  align-items: center;
  gap: 24px;
  width: min(400px, 80vw);
}

.svg-divider-rule::before,
.svg-divider-rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
}

.svg-divider-rule-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
}

/* ============================================================
   SECTION 5: PRODUCT GRID
   ============================================================ */
.products-section {
  padding: 80px 48px 100px;
  background-color: var(--bg);
  transition: background-color 0.5s var(--transition);
}

.section-header {
  max-width: 1200px;
  margin: 0 auto 60px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
}

.section-title-group {}

.section-overline {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
}

.section-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 300;
  color: var(--dark);
  line-height: 1.1;
  letter-spacing: 0.02em;
}

.section-title em {
  font-style: italic;
  color: var(--gold);
}

.product-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Product Card */
.product-card {
  background: var(--surface);
  border: 1px solid transparent;
  cursor: pointer;
  transition:
    transform 0.4s var(--transition),
    box-shadow 0.4s var(--transition),
    border-color 0.4s var(--transition),
    opacity 0.3s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.product-card.dimmed { opacity: 0.3; pointer-events: none; }

.product-card:hover {
  transform: translateY(-8px);
  border-color: var(--gold-dim);
  box-shadow:
    0 20px 60px var(--warm-glow),
    0 8px 24px var(--dark-alpha);
}

.product-card__image {
  position: relative;
  aspect-ratio: 4/5;
  background: linear-gradient(145deg, var(--bg), var(--surface));
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.product-card__bottle {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  z-index: 1;
}

/* CSS-drawn bottle */
.bottle-shape {
  position: relative;
  width: 60px;
}

.bottle-cap {
  width: 28px;
  height: 14px;
  background: var(--dark);
  margin: 0 auto;
  border-radius: 3px 3px 0 0;
  opacity: 0.7;
}

.bottle-neck {
  width: 20px;
  height: 20px;
  background: var(--dark);
  margin: 0 auto;
  opacity: 0.4;
}

.bottle-body {
  width: 60px;
  height: 80px;
  background: linear-gradient(135deg, var(--dark-alpha), var(--warm-glow), var(--dark-alpha));
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.bottle-body::before {
  content: '';
  position: absolute;
  top: 0; left: 20%;
  width: 20%;
  height: 100%;
  background: rgba(255,255,255,0.12);
  transform: skewX(-5deg);
}

.bottle-initial {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.05em;
  z-index: 1;
}

.product-card__glow {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.product-card:hover .product-card__glow { opacity: 1; }

.product-card__badge {
  position: absolute;
  top: 16px;
  right: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dark);
  background: var(--gold);
  padding: 4px 10px;
  z-index: 2;
}

.product-card__body {
  padding: 24px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.product-card__code {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
}

.product-card__brand {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}

.product-card__name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--dark);
  line-height: 1.2;
  letter-spacing: 0.01em;
}

.product-card__notes {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  letter-spacing: 0.03em;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s var(--transition), opacity 0.4s;
  opacity: 0;
}

.product-card:hover .product-card__notes {
  max-height: 60px;
  opacity: 1;
}

.product-card__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--dark-alpha);
}

.product-card__price {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--dark);
  letter-spacing: 0.05em;
}

.product-card__add {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--gold);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, color 0.3s, transform 0.3s;
  line-height: 1;
}

.product-card__add:hover {
  background: var(--gold);
  color: var(--dark);
  transform: rotate(90deg);
}

.product-card__family-tag {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  padding: 3px 8px;
  border-radius: 20px;
  z-index: 2;
}

/* ============================================================
   SECTION 6: BUNDLE BUILDER
   ============================================================ */
.bundle-section {
  background-color: var(--dark);
  padding: 100px 48px;
  position: relative;
  overflow: hidden;
}

.bundle-section::before {
  content: '';
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;

<script>
/**
 * JEF Theme Switcher
 * Injects a floating 3-way palette toggle into any preview page.
 * Swaps CSS custom properties on :root with a 0.35s transition.
 * Persists choice to localStorage under key "jef-theme".
 *
 * Inject at the end of <body> in any preview HTML.
 * Works inside srcdoc iframes (no cross-origin dependency).
 */

(function () {
  const THEMES = {
    ivory: {
      label: 'Warm Ivory',
      swatch: '#f5f0e8',
      border: '#b8975a',
      vars: {
        '--bg':         '#f5f0e8',
        '--surface':    '#ede8df',
        '--dark':       '#2a2420',
        '--text':       '#2a2420',
        '--gold':       '#b8975a',
        '--gold-dim':   '#c4a882',
        '--muted':      '#8a7d72',
        '--warm-glow':  'rgba(184,151,90,0.15)',
      },
    },
    dark: {
      label: 'Dark Luxury',
      swatch: '#09090b',
      border: '#c9a96e',
      vars: {
        '--bg':         '#09090b',
        '--surface':    '#111114',
        '--dark':       '#f5f0e8',
        '--text':       '#f5f0e8',
        '--gold':       '#c9a96e',
        '--gold-dim':   '#8a6b3f',
        '--muted':      '#8a8580',
        '--warm-glow':  'rgba(201,169,110,0.12)',
      },
    },
    neutral: {
      label: 'Warm Neutral',
      swatch: '#ede8df',
      border: '#c4a882',
      vars: {
        '--bg':         '#ede8df',
        '--surface':    '#e0d9ce',
        '--dark':       '#1e1a17',
        '--text':       '#1e1a17',
        '--gold':       '#c4a882',
        '--gold-dim':   '#a89880',
        '--muted':      '#a89880',
        '--warm-glow':  'rgba(196,168,130,0.18)',
      },
    },
  };

  const ORDER = ['ivory', 'dark', 'neutral'];
  const LABELS = { ivory: 'A', dark: 'B', neutral: 'C' };

  let current = localStorage.getItem('jef-theme') || 'ivory';

  function applyTheme(key) {
    const theme = THEMES[key];
    if (!theme) return;
    const root = document.documentElement;

    // Enable transition on all elements once for smooth swap
    const style = document.getElementById('jef-theme-transition') || document.createElement('style');
    style.id = 'jef-theme-transition';
    style.textContent = '*, *::before, *::after { transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease !important; }';
    document.head.appendChild(style);

    Object.entries(theme.vars).forEach(([prop, val]) => {
      root.style.setProperty(prop, val);
    });

    // Remove transition override after swap completes
    setTimeout(() => style.remove(), 400);

    current = key;
    localStorage.setItem('jef-theme', key);
    updateButtons();
  }

  function updateButtons() {
    ORDER.forEach((key) => {
      const btn = document.getElementById('jef-swatch-' + key);
      if (!btn) return;
      const isActive = key === current;
      btn.style.outline = isActive ? '2px solid ' + THEMES[key].border : '2px solid transparent';
      btn.style.transform = isActive ? 'scale(1.15)' : 'scale(1)';
      btn.title = THEMES[key].label + (isActive ? ' (active)' : '');
    });
  }

  function buildSwitcher() {
    const wrap = document.createElement('div');
    wrap.id = 'jef-theme-switcher';
    wrap.style.cssText = [
      'position: fixed',
      'bottom: 24px',
      'right: 24px',
      'z-index: 9999',
      'display: flex',
      'flex-direction: column',
      'align-items: center',
      'gap: 8px',
      'background: rgba(20,18,16,0.82)',
      'backdrop-filter: blur(12px)',
      '-webkit-backdrop-filter: blur(12px)',
      'border: 1px solid rgba(196,168,130,0.25)',
      'border-radius: 40px',
      'padding: 12px 10px',
      'box-shadow: 0 8px 32px rgba(0,0,0,0.4)',
    ].join(';');

    // Label
    const lbl = document.createElement('span');
    lbl.textContent = 'Palette';
    lbl.style.cssText = 'font: 500 9px/1 "DM Mono", "Courier New", monospace; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(245,240,232,0.5);';
    wrap.appendChild(lbl);

    ORDER.forEach((key) => {
      const theme = THEMES[key];

      const btn = document.createElement('button');
      btn.id = 'jef-swatch-' + key;
      btn.style.cssText = [
        'width: 28px',
        'height: 28px',
        'border-radius: 50%',
        'border: none',
        'cursor: pointer',
        'background: ' + theme.swatch,
        'transition: transform 0.2s ease, outline 0.2s ease',
        'outline-offset: 3px',
        'position: relative',
      ].join(';');
      btn.title = theme.label;
      btn.setAttribute('aria-label', 'Switch to ' + theme.label);

      // Letter badge
      const badge = document.createElement('span');
      badge.textContent = LABELS[key];
      badge.style.cssText = [
        'position: absolute',
        'inset: 0',
        'display: flex',
        'align-items: center',
        'justify-content: center',
        'font: 700 9px/1 "DM Mono", "Courier New", monospace',
        'color: ' + (key === 'dark' ? '#c9a96e' : '#2a2420'),
        'pointer-events: none',
      ].join(';');
      btn.appendChild(badge);

      btn.addEventListener('click', () => applyTheme(key));
      wrap.appendChild(btn);
    });

    document.body.appendChild(wrap);
    updateButtons();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(current);
      buildSwitcher();
    });
  } else {
    applyTheme(current);
    buildSwitcher();
  }
})();

</script>
