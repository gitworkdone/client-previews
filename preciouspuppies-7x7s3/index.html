<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PreciousPuppies — Grooming. Portraits. Joy.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/SplitText.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #F5F0E8;
  --warm-white: #FEFCF8;
  --charcoal: #1A1A1A;
  --mid-gray: #6B6560;
  --light-gray: #C8C3BC;
  --accent: #F4A623;
  --accent-light: #FDE8BB;
  --accent-dark: #C97D0A;
  --font-head: 'Space Grotesk', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --primary-blue: #2E5090;
  --light-blue: #E8F0F8;
  --secondary-teal: #16A397;
}

html { scroll-behavior: smooth; }

body {
  background: var(--warm-white);
  color: var(--charcoal);
  font-family: var(--font-head);
  font-weight: 300;
  overflow-x: hidden;
  cursor: default;
}

/* SVG GRAIN FILTER */
.grain-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.025;
  mix-blend-mode: multiply;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 32px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  mix-blend-mode: normal;
  transition: background 0.4s ease, padding 0.4s ease;
  background: var(--primary-blue);
}

nav.scrolled {
  background: rgba(46, 80, 144, 0.95);
  padding: 20px 48px;
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(26,26,26,0.06);
}

.nav-logo {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--warm-white);
  text-decoration: none;
  transition: color 0.3s ease;
}

nav.scrolled .nav-logo { color: var(--warm-white); }

.nav-links {
  display: flex;
  gap: 48px;
  list-style: none;
}

.nav-links a {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--warm-white);
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

nav.scrolled .nav-links a { color: var(--warm-white); }

.nav-links a::after {
  content: '_';
  position: absolute;
  right: -8px;
  opacity: 0;
  transition: opacity 0.2s ease;
  color: var(--secondary-teal);
}

.nav-links a:hover::after { opacity: 1; }

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 1px;
  background: var(--warm-white);
  transition: all 0.3s ease;
}

nav.scrolled .hamburger span { background: var(--warm-white); }

.mobile-menu {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--primary-blue);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 48px;
  transform: translateX(100%);
  transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
}

.mobile-menu.open { transform: translateX(0); }

.mobile-menu a {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: clamp(36px, 8vw, 72px);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--warm-white);
  text-decoration: none;
  transition: color 0.2s ease;
}

.mobile-menu a:hover { color: var(--secondary-teal); }

.mobile-close {
  position: absolute;
  top: 32px; right: 48px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--light-gray);
  cursor: pointer;
  text-transform: uppercase;
}

/* HERO */
#hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 700px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  background: linear-gradient(135deg, var(--primary-blue) 0%, var(--light-blue) 100%);
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1587300411515-430ee519b0f7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5MzQ1MTZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzcwNzc3ODB8&ixlib=rb-4.1.0&q=80&w=1080');
  background-size: cover;
  background-position: center 30%;
  z-index: 0;
  opacity: 0.3;
}

.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(46, 80, 144, 0.9) 0%, rgba(46, 80, 144, 0.5) 50%, rgba(46, 80, 144, 0.2) 100%);
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 0 48px 80px;
  max-width: 760px;
}

.hero-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--secondary-teal);
  margin-bottom: 24px;
  opacity: 0;
}

.hero-headline {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: clamp(52px, 9vw, 128px);
  line-height: 0.92;
  letter-spacing: -0.02em;
  color: var(--warm-white);
  text-transform: uppercase;
  margin-bottom: 40px;
}

.hero-headline em {
  font-style: normal;
  color: var(--secondary-teal);
}

.hero-sub {
  font-family: var(--font-head);
  font-weight: 200;
  font-size: clamp(14px, 1.6vw, 18px);
  letter-spacing: 0.05em;
  color: rgba(254,252,248,0.85);
  max-width: 380px;
  line-height: 1.7;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--warm-white);
  border: 1px solid var(--secondary-teal);
  border-radius: 0;
  padding: 16px 32px;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: color 0.2s ease;
  z-index: 1;
  background: var(--secondary-teal);
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--secondary-teal);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.2s ease;
  z-index: -1;
}

.btn-primary:hover { color: var(--warm-white); border-color: var(--secondary-teal); opacity: 0.8; }
.btn-primary:hover::before { transform: scaleX(1); }

.btn-outline {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--charcoal);
  border: 1px solid var(--charcoal);
  border-radius: 0;
  padding: 16px 32px;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: color 0.2s ease;
  z-index: 1;
}

.btn-outline::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--charcoal);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.2s ease;
  z-index: -1;
}

.btn-outline:hover { color: var(--warm-white); }
.btn-outline:hover::before { transform: scaleX(1); }

.btn-accent {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--secondary-teal);
  border: 1px solid var(--secondary-teal);
  border-radius: 0;
  padding: 16px 32px;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: color 0.2s ease;
  z-index: 1;
}

.btn-accent::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--secondary-teal);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.2s ease;
  z-index: -1;
}

.btn-accent:hover { color: var(--charcoal); }
.btn-accent:hover::before { transform: scaleX(1); }

.hero-vertical-nav {
  position: absolute;
  right: 48px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

.hero-vertical-nav span {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(254,252,248,0.6);
  writing-mode: vertical-rl;
  text-orientation: mixed;
}

.hero-scroll-line {
  width: 1px;
  height: 80px;
  background: linear-gradient(to bottom, rgba(254,252,248,0.6), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}

@keyframes scrollPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* STATS BAR */
#stats {
  background: var(--primary-blue);
  padding: 64px 48px;
}

.stats-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}

.stat-item {
  padding: 0 48px;
  border-right: 1px solid rgba(254,252,248,0.08);
}

.stat-item:first-child { padding-left: 0; }
.stat-item:last-child { border-right: none; }

.stat-number {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: clamp(40px, 5vw, 72px);
  color: var(--secondary-teal);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 8px;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--light-gray);
  font-weight: 400;
}

/* ABOUT */
#about {
  padding: 160px 48px;
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.about-image-wrap {
  position: relative;
}

.about-img {
  width: 100%;
  height: 640px;
  object-fit: cover;
  display: block;
  filter: none;
}

.about-image-accent {
  position: absolute;
  bottom: -32px;
  right: -32px;
  width: 180px;
  height: 180px;
  background: var(--secondary-teal);
  z-index: -1;
}

.about-content { padding-left: 24px; }

.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--secondary-teal);
  margin-bottom: 32px;
  display: block;
}

.section-headline {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: clamp(40px, 5vw, 72px);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  line-height: 0.95;
  color: var(--charcoal);
  margin-bottom: 40px;
}

.section-body {
  font-family: var(--font-head);
  font-weight: 200;
  font-size: 17px;
  line-height: 1.8;
  color: var(--mid-gray);
  margin-bottom: 24px;
}

.about-detail {
  margin-top: 48px;
  padding-top: 48px;
  border-top: 1px solid var(--light-gray);
  display: flex;
  align-items: center;
  gap: 24px;
}

.about-detail-text {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mid-gray);
}

/* SERVICES */
#services {
  background: var(--light-blue);
  padding: 160px 48px;
}

.services-inner { max-width: 1200px; margin: 0 auto; }

.services-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  margin-bottom: 100px;
  align-items: end;
}

.services-intro {
  font-family: var(--font-head);
  font-weight: 200;
  font-size: 17px;
  line-height: 1.8;
  color: var(--mid-gray);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
}

.service-card {
  background: var(--warm-white);
  overflow: hidden;
  position: relative;
  display: block;
  text-decoration: none;
  color: inherit;
}

.service-card:nth-child(2) { transform: translateY(48px); }

.service-card-img {
  width: 100%;
  height: 380px;
  object-fit: cover;
  display: block;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  filter: none;
}

.service-card:hover .service-card-img { transform: scale(1.03); }

.service-card-body {
  padding: 40px;
}

.service-card-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--secondary-teal);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: block;
}

.service-card-title {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: clamp(24px, 3vw, 36px);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--charcoal);
  margin-bottom: 16px;
  line-height: 1;
}

.service-card-desc {
  font-family: var(--font-head);
  font-weight: 200;
  font-size: 15px;
  line-height: 1.7;
  color: var(--mid-gray);
  margin-bottom: 32px;
}

.service-third {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  margin-top: 2px;
}

.service-third .service-card {
  transform: none;
}

.service-third .service-card .service-card-img { height: 280px; }

/* PORTFOLIO */
#portfolio {
  padding: 160px 48px;
  max-width: 1200px;
  margin: 0 auto;
}

.portfolio-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 80px;
}

.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

.portfolio-item {
  position: relative;
  overflow: hidden;
  display: block;
}

.portfolio-item:nth-child(2) {
  transform: translateY(-40px);
}

.portfolio-img {
  width: 100%;
  height: 480px;
  object-fit: cover;
  display: block;
  filter: none;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.portfolio-item:hover .portfolio-img { transform: scale(1.04); }

.portfolio-overlay {
  position: absolute;
  inset: 0;
  background: rgba(46, 80, 144, 0.0);
  display: flex;
  align-items: flex-end;
  padding: 32px;
  transition: background 0.3s ease;
}

.portfolio-item:hover .portfolio-overlay { background: rgba(46, 80, 144, 0.7); }

.portfolio-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--warm-white);
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.portfolio-item:hover .portfolio-label { opacity: 1; transform: translateY(0); }

/* STATEMENT */
#statement {
  background: var(--primary-blue);
  padding: 160px 48px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.statement-accent-top {
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 120px;
  background: var(--secondary-teal);
}

.statement-text {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: clamp(40px, 7vw, 100px);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--warm-white);
  line-height: 1;
  max-width: 1200px;
  margin: 0 auto 64px;
}

.statement-text em {
  font-style: normal;
  color: var(--secondary-teal);
}

.statement-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--light-gray);
  margin-bottom: 64px;
}

/* TESTIMONIALS */
#testimonials {
  padding: 160px 48px;
  background: var(--warm-white);
}

.testimonials-inner { max-width: 1200px; margin: 0 auto; }

.testimonials-header {
  margin-bottom: 80px;
}

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

.testimonial-card {
  background: var(--light-blue);
  padding: 56px 48px;
  position: relative;
}

.testimonial-card:nth-child(2) { transform: translateY(32px); }

.testimonial-quote {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: 72px;
  color: var(--secondary-teal);
  line-height: 0.5;
  margin-bottom: 32px;
  font-style: normal;
}

.testimonial-text {
  font-family: var(--font-head);
  font-weight: 200;
  font-size: 16px;
  line-height: 1.8;
  color: var(--mid-gray);
  margin-bottom: 40px;
}

.testimonial-author {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--charcoal);
}

.testimonial-role {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--light-gray);
  margin-top: 4px;
}

.stars {
  color: var(--secondary-teal);
  font-size: 14px;
  margin-bottom: 24px;
  letter-spacing: 4px;
}

/* FAQ */
#faq {
  padding: 160px 48px;
  background: var(--light-blue);
}

.faq-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 80px;
}

.faq-side {
  padding-top: 8px;
}

.faq-list { width: 100%; }

.faq-item {
  border-top: 1px solid var(--light-gray);
  overflow: hidden;
}

.faq-item:last-child { border-bottom: 1px solid var(--light-gray); }

.faq-question {
  width: 100%;
  background: none;
  border: none;
  padding: 28px 0;
  text-align: left;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
}

.faq-q-text {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--charcoal);
}

.faq-icon {
  font-family: var(--font-mono);
  font-size: 20px;
  color: var(--secondary-teal);
  line-height: 1;
  transition: transform 0.3s ease;
  flex-shrink: 0;
}

.faq-item.open .faq-icon { transform: rotate(45deg); }

.faq-answer {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.faq-a-inner {
  padding: 0 0 28px;
  font-family: var(--font-head);
  font-weight: 200;
  font-size: 15px;
  line-height: 1.8;
  color: var(--mid-gray);
}

/* CTA STRIP */
#cta {
  background: var(--secondary-teal);
  padding: 120px 48px;
  position: relative;
  overflow: hidden;
}

.cta-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 80px;
  align-items: center;
}

.cta-headline {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: clamp(40px, 6vw, 88px);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--warm-white);
  line-height: 0.95;
}

.cta-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(254,252,248,0.7);
  margin-top: 24px;
}

.btn-dark {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--secondary-teal);
  border: 1px solid var(--warm-white);
  background: var(--warm-white);
  border-radius: 0;
  padding: 20px 40px;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: color 0.2s ease, background 0.2s ease;
  white-space: nowrap;
}

.btn-dark:hover {
  background: transparent;
  color: var(--warm-white);
}

/* CONTACT */
#contact {
  padding: 160px 48px;
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 120px;
}

.contact-info {}

.contact-form-wrap {}

.contact-detail {
  margin-top: 48px;
  display: flex;
