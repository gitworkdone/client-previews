<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lucky Button &mdash; Component Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:100vw; height:100vh; overflow:hidden;
  background:#c8b4d8;
  display:flex; align-items:center; justify-content:center;
  font-family:'Inter',system-ui,sans-serif;
}
.bg {
  position:fixed; inset:0; z-index:0;
  background-image: url('https://trill-merge-65357897.figma.site/_assets/v10/555c0dbdf8e4d07301d5ff5c75b2888e8dd02850.png');
  background-size:cover; background-position:center; background-repeat:no-repeat;
}
.btn-wrap {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:center;
}
.lucky-btn {
  position:relative;
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:12px 22px;
  border-radius:38px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.1);
  cursor:pointer;
  outline:none;
  user-select:none;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s,
    transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  will-change:transform;
  overflow:visible;
}
.lucky-btn::before {
  content:'';
  position:absolute; inset:0;
  border-radius:38px;
  background:linear-gradient(to right, rgba(255,255,255,0.1), rgba(255,255,255,0.05), transparent);
  pointer-events:none;
}
.lucky-btn:hover {
  background:rgba(255,255,255,0.3);
  border-color:rgba(255,255,255,0.5);
  box-shadow:0 16px 48px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.15);
  transform:scale(1.05);
}
.lucky-btn:active {
  transform:scale(0.95);
  transition-duration:0.1s;
}
.btn-label {
  font-size:20px; font-weight:400; letter-spacing:-0.7px; color:#fff;
  filter:drop-shadow(0 4px 4px rgba(0,0,0,0.15));
  position:relative; z-index:1; white-space:nowrap;
}
#burst { position:fixed; inset:0; pointer-events:none; z-index:9999; }
.burst-cursor {
  position:absolute; color:white; pointer-events:none;
  will-change:transform,opacity;
}
.burst-cursor svg { filter:drop-shadow(0 2px 4px rgba(0,0,0,0.25)); }
.page-label {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(255,255,255,0.5); z-index:10;
}
</style>
</head>
<body>
<div class="bg"></div>
<div id="burst"></div>
<div class="btn-wrap">
  <button class="lucky-btn" id="luckyBtn" aria-label="I'm feeling lucky">
    <span class="btn-label">I&rsquo;m feeling lucky</span>
  </button>
</div>
<div class="page-label">Component Demo &mdash; Hover the button</div>
<script>
const CURSOR_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
  stroke-linecap="round" stroke-linejoin="round">
  <path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/>
</svg>`;

const btn   = document.getElementById('luckyBtn');
const burst = document.getElementById('burst');

const N           = 34;
const ORBIT_R     = 150;   // base radius
const DEG_PER_SEC = 42;    // CCW orbit speed
const SPAWN_MS    = 720;
const DEPART_MS   = 420;

let arrows   = [];
let rafId    = null;
let lastTime = null;

function getCenter() {
  const r = btn.getBoundingClientRect();
  return [r.left + r.width / 2, r.top + r.height / 2];
}

function spawnArrows(now) {
  for (let i = 0; i < N; i++) {
    const baseAngle   = (i / N) * 360;
    const angleJitter = (Math.random() - 0.5) * (360 / N) * 1.4;  // organic scatter
    const rotJitter   = (Math.random() - 0.5) * 28;
    const radiusDelta = (Math.random() - 0.5) * 70;                // ±35px radius spread
    const baseScale   = 0.55 + Math.random() * 0.8;                // 0.55–1.35 size variation
    const baseOpacity = 0.5  + Math.random() * 0.5;                // 0.5–1.0 opacity variation
    const el = document.createElement('div');
    el.className = 'burst-cursor';
    el.innerHTML = CURSOR_SVG;
    el.style.opacity = '0';
    burst.appendChild(el);
    arrows.push({
      el, rotJitter, radiusDelta, baseScale, baseOpacity,
      angle: baseAngle + angleJitter,
      born: now, phase: 'spawn', departAt: null,
    });
  }
}

function killAll() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  arrows.forEach(a => a.el.remove());
  arrows = []; lastTime = null;
}

function loop(now) {
  const dt = lastTime !== null ? (now - lastTime) / 1000 : 0;
  lastTime = now;
  const [bx, by] = getCenter();

  arrows = arrows.filter(a => {
    let prog;

    if (a.phase === 'spawn') {
      const t = Math.min((now - a.born) / SPAWN_MS, 1);
      prog = 1 - Math.pow(1 - t, 4);   // easeOutQuart
      if (t >= 1) a.phase = 'orbit';
    } else if (a.phase === 'orbit') {
      prog = 1;
    } else {
      const t = Math.min((now - a.departAt) / DEPART_MS, 1);
      prog = 1 - t * t;                 // easeInQuad out
      if (t >= 1) { a.el.remove(); return false; }
    }

    a.angle -= DEG_PER_SEC * dt;

    const r   = (ORBIT_R + a.radiusDelta) * prog;
    const rad = a.angle * Math.PI / 180;
    const x   = bx + Math.cos(rad) * r;
    const y   = by + Math.sin(rad) * r;

    // +45 = tangential (points in CCW direction of travel), matches original
    const face = a.angle + 45 + a.rotJitter;
    const sc   = a.baseScale * prog;

    a.el.style.left      = x + 'px';
    a.el.style.top       = y + 'px';
    a.el.style.transform = `translate(-50%,-50%) rotate(${face}deg) scale(${sc})`;
    a.el.style.opacity   = a.baseOpacity * prog;

    return true;
  });

  if (arrows.length > 0) {
    rafId = requestAnimationFrame(loop);
  } else {
    rafId = null; lastTime = null;
  }
}

btn.addEventListener('mouseenter', () => {
  killAll();
  const now = performance.now();
  spawnArrows(now);
  rafId = requestAnimationFrame(loop);
});

btn.addEventListener('mouseleave', () => {
  const now = performance.now();
  arrows.forEach(a => { a.phase = 'depart'; a.departAt = now; });
});
</script>
</body>
</html>
